        const r1 = ref(null);
        const r2 = ref(null);
        const r3 = ref(null);

        const scores = computed(() => {
          const s = {};
          const add = (tbl) => {
            if (!tbl) return;
            Object.entries(tbl).forEach(([k, v]) => {
              s[k] = (s[k] || 0) + v;
            });
          };
          add(WEIGHTS.round1[r1.value]);
          add(WEIGHTS.round2[r2.value]);
          return s;
        });

        const ranked = computed(() => {
          return Object.entries(scores.value)
            .sort((a, b) => b[1] - a[1])
            .map(([id]) => id);
        });

        const topIngredient = computed(() => ranked.value[0] || null);
        const secondIngredients = computed(() => ranked.value.slice(1, 3));

        const mainProduct = computed(() => {
          const id = topIngredient.value;
          const form = r3.value || 'capsule';
          const pool = FAKE_PRODUCTS[id] || FAKE_PRODUCTS.default;
          return pool[form] || pool.capsule;
        });

        function productForIngredient(ingId) {
          const form = r3.value || 'capsule';
          const pool = FAKE_PRODUCTS[ingId] || FAKE_PRODUCTS.default;
          return pool[form] || pool.capsule;
        }

        function infoFor(id) {
          return INGREDIENT_INFO[id] || { name: id, nameEn: '', oneLine: '' };
        }

        function pickRound1(id) {
          r1.value = id;
          step.value = 'round2';
        }
        function pickRound2(id) {
          r2.value = id;
          step.value = 'round3';
        }
        function pickRound3(id) {
          r3.value = id;
          step.value = 'result';
        }
        function restart() {
          r1.value = null;
          r2.value = null;
          r3.value = null;
          step.value = 'intro';
        }

        function onImageError(event, seed) {
          const fallback = placeholderImg(seed || 'health-default');
          if (event?.target && event.target.src !== fallback) {
            event.target.src = fallback;
          }
        }

        function goBack() {
          if (step.value === 'round1') {
            step.value = 'intro';
          } else if (step.value === 'round2') {
            r2.value = null;
            step.value = 'round1';
          } else if (step.value === 'round3') {
            r3.value = null;
            step.value = 'round2';
          } else if (step.value === 'result') {
            step.value = 'round3';
          } else {
            window.history.back();
          }
        }

        const progressStyle = computed(() => {
          if (step.value === 'round1') return { width: '33.333%' };
          if (step.value === 'round2') return { width: '66.666%' };
          if (step.value === 'round3') return { width: '100%' };
          return { width: '0%' };
        });

        return {
          step,
          r1,
          r2,
