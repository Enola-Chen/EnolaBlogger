            </div>

          <h2 class="mt-6 font-mincho text-3xl font-semibold tracking-[0.06em] text-stone-900 sm:text-4xl">研究動機與目的</h2>

          </p>

            <div class="order-2 flex w-full flex-col justify-center gap-8 lg:w-1/2">
              <div>
                <h3 class="font-inter text-lg font-semibold text-stone-900">研究背景</h3>
                <p class="mt-3 font-sans-zh text-sm leading-relaxed text-stone-700 sm:text-base">
                  近年來「寵物經濟」與「療癒商機」爆發，顯示現代人對於情感陪伴的需求日益增加。然而，在快節奏的生活中，許多人雖然渴望擁有寵物，卻常因時間破碎、居住空間受限等現實因素，無法承擔飼養實體寵物的長期責任。
                </p>
                <p class="mt-3 font-sans-zh text-sm leading-relaxed text-stone-700 sm:text-base">
                  另一方面，植物本身即具備極佳的療癒特性，但對於缺乏園藝經驗的使用者而言，特別是面對如「白草莓」這類對環境要求嚴苛的高經濟價值作物，往往因為無法及時察覺植物的健康變化，導致栽種失敗，反而帶來挫折感。因此，我們希望打造一款能帶來陪伴感、有互動性、卻不會增加生活負擔的新型態寵物。
                </p>
              </div>

                <ul class="mt-5 flex flex-col gap-8 pl-0 font-sans-zh text-sm leading-[1.85] text-stone-700 sm:text-base">
                  <li class="flex gap-3">

                      <p class="mt-2">
                        導入 EfficientNet-B0 分類模型，可辨識 7 種草莓常見病害。系統能主動判斷植物狀況，提供對應的改善建議，即使完全沒有園藝經驗的新手，也能輕鬆培養出健康植株
                      </p>
                    </div>
                  </li>
                  <li class="flex gap-3">
                    <div class="mt-2 h-1.5 w-1.5 shrink-0 rounded-full bg-emerald-600"></div>
                    <div class="min-w-0 flex-1">
                      <div class="font-semibold text-stone-900">提升管理效率｜自動化調控</div>
                      <p class="mt-2">
                        透過邊緣運算整合環境感測數據，系統可自動執行澆水與光照調整。即使在忙碌的日常生活中，也能穩定維持良好的栽培環境，大幅降低照顧負擔
                      </p>
                    </div>
                  </li>
                  <li class="flex gap-3">
                    <div class="mt-2 h-1.5 w-1.5 shrink-0 rounded-full bg-emerald-600"></div>
                    <div class="min-w-0 flex-1">
                      <div class="font-semibold text-stone-900">直覺化互動｜植物表情回饋</div>
                      <p class="mt-2">
                        將環境數據轉化為螢幕上的表情變化，讓使用者能快速理解植物當下狀態。植物不再只是靜態存在，而是具備情感回饋的互動陪伴
                      </p>
                    </div>
                  </li>
                  <li class="flex gap-3">
                    <div class="mt-2 h-1.5 w-1.5 shrink-0 rounded-full bg-emerald-600"></div>
                    <div class="min-w-0 flex-1">

                      <p class="mt-2">
                        結合 Flask、WebSocket 與 Vue 3 建立即時監控介面。在同一網域環境下，可透過手機或電腦查看土壤濕度、光照、溫濕度與疾病偵測結果，並支援手動與自動操作，全面提升照護精準度
                      </p>
                    </div>
                  </li>
                  <li class="flex gap-3">

                    <div class="min-w-0 flex-1">
                      <div class="font-semibold text-stone-900">市場潛力｜結合療癒與科技應用</div>
                      <p class="mt-2">
                        呼應近年成長中的療癒與陪伴需求，將傳統植栽的照顧難題轉化為智慧解決方案，打造兼具實用性與情感價值的科技產品，具備高度商品化潛力
                      </p>

                  </li>

          <p class="mt-2 max-w-3xl font-sans-zh text-sm leading-relaxed text-stone-600 sm:text-base">
            以邊緣端即時運算與前後端可擴充性為核心，將系統分為感測層、AI 推論層、後端服務層與前端介面層
          </p>
          <p class="mt-2 max-w-3xl font-sans-zh text-sm leading-relaxed text-stone-600 sm:text-base">資料流程整合即時環境感測、影像辨識與遠端操作控制，形成監測、判斷與自動調控的完整閉環</p>
